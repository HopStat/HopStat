{{define "admin/users"}}
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Users - Looking Glass Admin</title><link href="/static/css/app.css" rel="stylesheet"></head>
<body class="bg-gray-100 min-h-screen">
<nav class="bg-white shadow"><div class="max-w-7xl mx-auto px-4 py-3 flex justify-between"><div class="flex gap-4"><a href="/" class="text-gray-600 hover:text-gray-900">Home</a><a href="/admin" class="text-gray-600 hover:text-gray-900">Dashboard</a><a href="/admin/nodes" class="text-gray-600 hover:text-gray-900">Nodes</a><a href="/admin/pops" class="text-gray-600 hover:text-gray-900">POPs</a><a href="/admin/audit" class="text-gray-600 hover:text-gray-900">Audit</a><a href="/admin/users" class="text-blue-600 font-bold">Users</a><a href="/admin/community-rules" class="text-gray-600 hover:text-gray-900">Rules</a></div><a href="#" onclick="localStorage.removeItem('jwt_token');window.location.href='/admin/login'" class="text-red-600">Logout</a></div></nav>
<div class="max-w-7xl mx-auto px-4 py-6">
  <div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold">Users</h1><button onclick="document.getElementById('user-modal').classList.remove('hidden')" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Add User</button></div>
  <div class="bg-white rounded-lg shadow overflow-hidden"><table class="min-w-full"><thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Role</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Created</th><th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th></tr></thead><tbody id="users-table" class="divide-y divide-gray-200"></tbody></table></div>
</div>
<div id="user-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"><div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md">
  <h2 class="text-xl font-bold mb-4">Add User</h2>
  <form onsubmit="saveUser(event)">
    <div class="mb-3"><label class="block text-sm font-bold mb-1">Email</label><input type="email" id="user-email" required class="w-full px-3 py-2 border rounded"></div>
    <div class="mb-3"><label class="block text-sm font-bold mb-1">Password</label><input type="password" id="user-password" required class="w-full px-3 py-2 border rounded" minlength="8"></div>
    <div class="mb-3"><label class="block text-sm font-bold mb-1">Role</label><select id="user-role" class="w-full px-3 py-2 border rounded"><option value="admin">Admin</option></select></div>
    <div class="flex justify-end gap-2"><button type="button" onclick="document.getElementById('user-modal').classList.add('hidden')" class="px-4 py-2 border rounded">Cancel</button><button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Save</button></div>
  </form>
</div></div>
</body>
<script>
function escapeHTML(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
const token=localStorage.getItem('jwt_token');if(!token)window.location.href='/admin/login';
const headers={'Authorization':'Bearer '+token,'Content-Type':'application/json'};
async function loadUsers(){const r=await fetch('/api/v1/admin/users',{headers});const d=await r.json();const tb=document.getElementById('users-table');const users=d.data||[];if(!users.length){tb.innerHTML='<tr><td colspan="4" class="px-6 py-4 text-center text-gray-500">No users</td></tr>';return;}
tb.innerHTML=users.map(u=>`<tr><td class="px-6 py-4 font-medium">${escapeHTML(u.email)}</td><td class="px-6 py-4 text-sm">${escapeHTML(u.role)}</td><td class="px-6 py-4 text-sm text-gray-500">${escapeHTML(u.created_at||'')}</td><td class="px-6 py-4 text-right"><button onclick="deleteUser(${u.id})" class="text-red-600 hover:underline text-sm">Delete</button></td></tr>`).join('');}
async function saveUser(e){e.preventDefault();await fetch('/api/v1/admin/users',{method:'POST',headers,body:JSON.stringify({email:document.getElementById('user-email').value,password:document.getElementById('user-password').value,role:document.getElementById('user-role').value})});document.getElementById('user-modal').classList.add('hidden');loadUsers();}
async function deleteUser(id){if(!confirm('Delete this user?'))return;await fetch('/api/v1/admin/users/'+id,{method:'DELETE',headers});loadUsers();}
loadUsers();
</script>
</html>
{{end}}
