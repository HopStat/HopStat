{{define "admin/audit"}}
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Audit - Looking Glass Admin</title><link href="/static/css/app.css" rel="stylesheet"></head>
<body class="bg-gray-100 min-h-screen">
<nav class="bg-white shadow"><div class="max-w-7xl mx-auto px-4 py-3 flex justify-between"><div class="flex gap-4"><a href="/" class="text-gray-600 hover:text-gray-900">Home</a><a href="/admin" class="text-gray-600 hover:text-gray-900">Dashboard</a><a href="/admin/nodes" class="text-gray-600 hover:text-gray-900">Nodes</a><a href="/admin/pops" class="text-gray-600 hover:text-gray-900">POPs</a><a href="/admin/audit" class="text-blue-600 font-bold">Audit</a><a href="/admin/users" class="text-gray-600 hover:text-gray-900">Users</a><a href="/admin/community-rules" class="text-gray-600 hover:text-gray-900">Rules</a></div><a href="#" onclick="localStorage.removeItem('jwt_token');window.location.href='/admin/login'" class="text-red-600">Logout</a></div></nav>
<div class="max-w-7xl mx-auto px-4 py-6">
  <div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold">Audit Log</h1><a href="/api/v1/admin/audit/export" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Export CSV</a></div>
  <div class="bg-white rounded-lg shadow overflow-hidden"><table class="min-w-full"><thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Time</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">IP</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Command</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Params</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Duration</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th></tr></thead><tbody id="audit-table" class="divide-y divide-gray-200"></tbody></table></div>
  <div class="flex justify-center mt-4 gap-2" id="pagination"></div>
</div>
</body>
<script>
function escapeHTML(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
const token=localStorage.getItem('jwt_token');if(!token)window.location.href='/admin/login';
const headers={'Authorization':'Bearer '+token};let currentPage=0;
async function loadAudit(page){currentPage=page;const r=await fetch('/api/v1/admin/audit?limit=20&page='+page,{headers});const d=await r.json();const tb=document.getElementById('audit-table');const entries=d.data||[];
if(!entries.length){tb.innerHTML='<tr><td colspan="6" class="px-4 py-4 text-center text-gray-500">No entries</td></tr>';return;}
tb.innerHTML=entries.map(e=>`<tr><td class="px-4 py-3 text-sm text-gray-600">${escapeHTML(e.created_at||'')}</td><td class="px-4 py-3 text-sm font-mono">${escapeHTML(e.source_ip||'')}</td><td class="px-4 py-3"><span class="px-2 py-1 text-xs font-mono bg-blue-100 text-blue-800 rounded">${escapeHTML(e.command||'')}</span></td><td class="px-4 py-3 text-sm font-mono max-w-xs truncate">${escapeHTML(e.params||'')}</td><td class="px-4 py-3 text-sm">${e.duration_ms?e.duration_ms+'ms':'-'}</td><td class="px-4 py-3"><span class="px-2 py-1 text-xs rounded-full ${e.success?'bg-green-100 text-green-800':'bg-red-100 text-red-800'}">${e.success?'OK':'Error'}</span></td></tr>`).join('');
const meta=d.meta||{};const totalPages=Math.ceil((meta.total||0)/(meta.limit||20));const pg=document.getElementById('pagination');if(totalPages>1){pg.innerHTML=Array.from({length:Math.min(totalPages,10)},(_,i)=>`<button onclick="loadAudit(${i})" class="px-3 py-1 rounded ${i===currentPage?'bg-blue-600 text-white':'bg-gray-200'}">${i+1}</button>`).join('');}}
loadAudit(0);
</script>
</html>
{{end}}
