{{define "partials/result_traceroute"}}
<div class="bg-white rounded-lg shadow p-4">
  <h3 class="font-bold text-lg mb-3">Traceroute Result</h3>
  {{if .Hops}}<div class="overflow-x-auto"><table class="min-w-full"><thead class="bg-gray-50"><tr><th class="px-3 py-2 text-xs font-medium text-gray-500 uppercase">#</th><th class="px-3 py-2 text-xs font-medium text-gray-500 uppercase">Host</th><th class="px-3 py-2 text-xs font-medium text-gray-500 uppercase">IP</th><th class="px-3 py-2 text-xs font-medium text-gray-500 uppercase">RTT</th></tr></thead><tbody class="divide-y">{{range .Hops}}<tr><td class="px-3 py-2 text-sm">{{.Number}}</td><td class="px-3 py-2 text-sm">{{.Host}}</td><td class="px-3 py-2 text-sm font-mono">{{.IP}}</td><td class="px-3 py-2 text-sm">{{range .RTT}}{{printf "%.2f" .}}ms {{end}}</td></tr>{{end}}</tbody></table></div>{{end}}
  <details class="mt-3"><summary class="cursor-pointer text-sm text-gray-500">Raw Output</summary><pre class="mt-2 p-3 bg-gray-100 rounded text-xs overflow-x-auto">{{.Raw}}</pre></details>
</div>
{{end}}
